{% extends 'food/base.html' %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="{% static 'food/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    {% block body %}

    <div class="container-fluid mt-5">
        <div class="row">

    {% for item in item_list %}
    <div class="col-md-3">
        <div class="card" style="width: 18rem;">
            <img src="{{item.item_image}}" class="card-img-top"/>
            <div class="card-body">
                <h5 class="card-title">{{item.item_name}}</h5>
                <p class="card-text">{{item.item_description}}</p>
                <p class="card-text">$ {{item.item_price}}</p>
                <a href="{% url 'food:detail' item.id%}" class="btn btn-primary">Details</a>
                <a href="{% url 'food:update_item' item.id%}" class="btn btn-outline-secondary">Edit</a>
            </div>
        </div>
    </div>
    {% endfor %}

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    {% endblock %}
</body>

</html>
